name: Hourly Reminder Check

on:
  schedule:
    - cron: '* * * * *'  # Runs every 1 minute (Subject to GitHub's internal delays)
  workflow_dispatch:     # Allows you to manually click "Run workflow"

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Route
        run: |
          curl -i -X GET "https://project-tracker-nine-phi.vercel.app/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"